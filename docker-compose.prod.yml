# docker-compose.prod.yml
services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - ./backend/app/.env
    environment:
      # Set this to your actual public domain, e.g. https://careerwise.example.com
      ALLOWED_ORIGINS: "${PUBLIC_ORIGIN:-http://localhost}"
    volumes:
      - resume_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  resume_uploads: