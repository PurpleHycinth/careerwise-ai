version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/app/.env
    environment:
      # Allow both localhost and 127.0.0.1 from the browser
      ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    volumes:
      # Persist uploaded resumes across restarts
      - resume_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      # Browser hits backend directly (ports exposed to host)
      VITE_API_BASE: "http://localhost:8000"
    depends_on:
      - backend

volumes:
  resume_uploads: